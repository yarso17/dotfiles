[global/wm]
margin-bottom = 0
margin-top = 0

[bar/mainbar]
monitor = "eDP-1"
background = ${color.trans}
foreground = ${color.white}
font-0 = SF Pro Text:style=Medium:pixelsize=12;2
font-1 = "Iosevka Nerd Font:size=12;3"

separator =

dim-value = 1.0
wm-name = 
locale = 
tray-position = none
tray-detached = false
tray-maxsize = 16
tray-background = ${color.trans}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0
enable-ipc = true

height = 24
line-size = 2
modules-left = host i3
modules-right = network alsa battery datetime
padding = 3
module-margin = 2

[settings]
throttle-output = 5
throttle-output-for = 10
screenchange-reload = false
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over
pseudo-transparency = false

[module/host]
type = custom/text
content = carmeloÔõó
; click-left = ~/.config/polybar/panels/scripts/launcher.sh --ugnome
; click-right = ~/.config/polybar/panels/scripts/launcher.sh --ugnome
click-left = ~/scripts/showBatteryLevel
click-right = ~sScripts/showBatteryLevel

[module/i3]
type = internal/i3
label-focused-underline = ${color.white}
strip-wsnumber = true
label-mode-padding = 1
label-focused = %index%
label-unfocused = %index%
label-unfocused-foreground = ${color.fg-alt}
label-focused-padding = 1
label-unfocused-padding = 1
enable-scroll = false
reverse-scroll = false

[module/alsa]
type = internal/alsa
format-volume = <ramp-volume>
label-volume = %percentage%%
label-muted = ÔĪĚ
label-muted-foreground = ${color.fg-alt}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®
ramp-volume-3 = ÔÄ®

[module/battery]
type = internal/battery
full-at = 99
battery = BAT1
adapter = ACAD

poll-interval = 2
time-format = %H:%M
format-charging = <animation-charging>
format-discharging = <ramp-capacity>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Ôēł
label-full-foreground = ${color.green} 

ramp-capacity-0 = ÔĖć
ramp-capacity-0-foreground = ${color.red}
ramp-capacity-1 = ÔēĻ
ramp-capacity-1-foreground = ${color.red}

ramp-capacity-2 = Ôēļ
ramp-capacity-2-foreground = ${color.amber}
ramp-capacity-3 = ÔēĽ
ramp-capacity-3-foreground = ${color.amber}

ramp-capacity-4 = ÔēĹ
ramp-capacity-5 = Ôēĺ
ramp-capacity-6 = ÔēŅ
ramp-capacity-7 = ÔĖÄ
ramp-capacity-8 = ÔĖĀ

ramp-capacity-9 = Ôēł
ramp-capacity-9-foreground = ${color.green}

animation-charging-0 = ÔĖÖ
animation-charging-1 = ÔĖÜ
animation-charging-2 = ÔĖá
animation-charging-3 = ÔĖą
animation-charging-4 = ÔĖČ
animation-charging-5 = ÔĖä
animation-charging-6 = ÔĖĄ
animation-charging-foreground = ${color.blue}

; Framerate in milliseconds
animation-charging-framerate = 750

; Default settings
;  -- Iconos --
; format-charging = <ramp-capacity>
; format-discharging = <ramp-capacity>
; ramp-capacity-0 = "ÔČĄ"
; ramp-capacity-1 = "ÔČÉ"
; ramp-capacity-2 = "ÔČā"
; ramp-capacity-3 = "ÔČĀ"
; ramp-capacity-4 = "ÔČÄ"

[module/network]
type = internal/network
interface = wlan0
label-disconnected = "Ôáę  Not connected"
label-disconnected-foreground = ${color.amber}
label-connected = "Ôáę"

[module/datetime]
type = internal/date
date = %a %b %d  %H:%M %p

